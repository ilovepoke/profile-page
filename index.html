<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>自己紹介</title>
        <link rel="stylesheet" href="style.css">
        
    </head>
    <body>
        <div class="profile-card">
            <h1>自己紹介</h1>
            <div class="profile-image">
                <img src="images/profile.png" alt="新藤綾那のプロフィール画像">
            </div>

            <dl>
                <dt>名前</dt>
                <dd>新藤綾那</dd>

                <dt>所属</dt>
                <dd>山形大学</dd>

                <dt>趣味</dt>
                <dd>
                    <ul>
                        <li>バスケ</li>
                        <li>プログラミング</li>
                        <li>読書</li>
                    </ul>
                </dd>
            </dl>

            <p>Nice to meet you :D</p>
        </div>

        <div class ="profile-actions">
            <button id="show-button">詳しく見る</button>
            <p id = "profile-message" class="hidden">
                こんにちは！
                山形大学で情報工学を学んでいます。
            </p>
        </div>
        <script src="script.js"></script>
    </body>

</html>
